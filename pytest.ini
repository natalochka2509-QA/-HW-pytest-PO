[pytest]
# Pytest configuration with Allure integration
addopts = 
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
    -p no:warnings

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    smoke: Smoke tests - quick critical path tests
    regression: Regression tests - comprehensive test coverage
    ui: UI tests - tests for user interface
